<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Prompt & URL Helper</title>
</head>
<body style="font-family: Arial, sans-serif; padding: 20px; max-width: 800px; margin: 0 auto;">

    <h2>AI Prompt & URL Helper</h2>
    
    <label for="myUrlInput" style="display: block; margin-bottom: 5px; font-weight: bold;">URL:</label>
    <input type="text" id="myUrlInput" value="https://gemini.google.com/app" style="width: 100%; padding: 8px; margin-bottom: 15px; box-sizing: border-box;">

    <label for="myTextAreaInput" style="display: block; margin-bottom: 5px; font-weight: bold;">Text Content:</label>
    <textarea id="myTextAreaInput" rows="6" style="width: 100%; padding: 10px; margin-bottom: 15px; box-sizing: border-box;">Highlight any part of this text and click a button. If nothing is selected, the whole text will be used!</textarea>

    <div style="margin-bottom: 15px;">
        <button onclick="myHandleAction('custom')" style="padding: 10px 20px; margin-right: 10px; cursor: pointer; font-weight: bold; background-color: #fff3e0; border: 1px solid #ffe0b2;">Send Selected to URL</button>
        <button onclick="myHandleAction('https://gemini.google.com/app')" style="padding: 10px 20px; margin-right: 10px; cursor: pointer;">Gemini</button>
        <button onclick="myHandleAction('https://chatgpt.com/')" style="padding: 10px 20px; margin-right: 10px; cursor: pointer;">ChatGPT</button>
        <button onclick="myHandleAction('https://claude.ai/new')" style="padding: 10px 20px; cursor: pointer;">Claude</button>
    </div>

    <script>
        // One single function to manage selection, clipboard clearing/writing, and navigation
        async function myHandleAction(myTargetUrl) {
            const myTextArea = document.getElementById("myTextAreaInput");
            
            // 1. Check selection fresh
            let myStartPos = myTextArea.selectionStart;
            let myEndPos = myTextArea.selectionEnd;
            
            if (myStartPos === myEndPos) {
                window.getSelection().removeAllRanges();
                myTextArea.select();
                myStartPos = 0;
                myEndPos = myTextArea.value.length;
            }
            
            const myText = myTextArea.value.substring(myStartPos, myEndPos);
            
            // 2. Clear and write to clipboard
            try {
                await navigator.clipboard.writeText("");
                await navigator.clipboard.writeText(myText);
            } catch (myError) {
                console.log("Clipboard sync failed.", myError);
            }
            
            // 3. Resolve URL and open window
            const myFinalUrl = (myTargetUrl === 'custom') ? document.getElementById("myUrlInput").value : myTargetUrl;
            window.open(myFinalUrl, '_blank');
        }
    </script>
</body>
</html>
